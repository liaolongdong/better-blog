		<script>
			// console.log(444);

			// 多叉树的结构
			var tree = {
				val: 1,
				children: [
					{
						val: 2,
						children: [
							{
								val: 5,
								children: [
									{
										val: 12,
									},
								],
							},
							{
								val: 6,
								children: [
									{
										val: 13,
									},
									{
										val: 14,
									},
									{
										val: 15,
									},
									{
										val: 16,
									},
								],
							},
							{
								val: 7,
							},
						],
					},
					{
						val: 3,
						children: [
							{
								val: 8,
								children: [
									{
										val: 17,
									},
								],
							},
						],
					},
					{
						val: 4,
					},
				],
			};

      // 实现代码
			var levelOrder = function (root) {
				if (!root) {
					return [];
				}

				const ans = [];
				const queue = [root];

				while (queue.length) {
					const cnt = queue.length;
					const level = [];
					for (let i = 0; i < cnt; ++i) {
						const cur = queue.shift();
						level.push(cur.val);
            if (cur.children) {
              for (const child of cur.children) {
                queue.push(child);
              }
            }
					}
					ans.push(level);
				}

				return ans;
			};

      // 测试结果：
      console.log(levelOrder(tree))
		</script>
