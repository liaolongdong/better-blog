    },
    {
      date: '未来',
      content: '这段时间在哪里工作，工作经验，项目经验等等'
    }
  ]

# back to top
bottomFixedBtn: true

# show cat
showCat: true

# Footer
footer:
  since: 2018
  showBaiduStatics: true

# Search
search: true

# Night mode
nightMode: true

# Reward 赞赏功能
reward:
  enable: true
  reward_comment: '真诚赞赏 手有余香'
  wechatpay: '/assets/img/wechatpay.jpg'
  alipay: '/assets/img/alipay.jpg'

# 是否使用畅言评论系统（使用畅言必须对网站进行备案，否则只能试用15天）
changyan:
  enable: true

# 是否使用来必力评论系统
livere:
  enable: false

# Comments 评论功能
comments:
  disqus: false
  disqus_url: 'https://liaolongdong.disqus.com/embed.js'

# MathJax 公式支持
mathjax: true

# Share
social-share: true
social-share-items: ['wechat', 'weibo', 'qzone', 'qq', 'douban']

# theme color 主题皮肤
theme-color: 'default'  # pink or default

# Post header background patterns (when the post no cover): circuitBoard, overlappingCircles, food, glamorous, ticTacToe, seaOfClouds
postPatterns: 'overlappingCircles'
tagsPatterns: 'food'
demoPatterns: 'glamorous'

# SNS settings 配置社交网站
# url: email, weibo, zhihu, twitter, instagram, juejin, github, douban, facebook, dribble, uicn, jianshu, medium, linkedin
sns:
  email: 'mailto:924902324@qq.com'
  weibo: 'https://weibo.com/liaolongdong/home'
  juejin: 'https://juejin.im/user/5771328b7db2a20054094d86'
  zhihu: 'https://www.zhihu.com/people/liao-long-dong/activities'
  github: 'https://github.com/liaolongdong'

# Tags 设置标签
recommend-tags: true # whether or not display recommend-tags on the sidebar
recommend-condition-size: 12 # a tag will be recommended if the size of it is more than this value

# Build settings
paginate: 5
paginate_path: 'page:num'
exclude: ['node_modules', 'dev', 'package.json', 'gulpfile.js', '.gitignore', 'README.md']

# Markdown
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM

# RSS
RSS: false

# Permalink
# See: https://github.com/kaeyleo/jekyll-theme-H2O/issues/35
permalink: /:year/:month/:day/:title.html

# Plugins
# jekyll-paginate jekyll分页插件
# jekyll-sitemap jekyll生成sitemap文件插件
plugins: [jekyll-paginate, jekyll-sitemap]
