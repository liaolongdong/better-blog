# Site settings 配置站点
title: 'Better’s study fairyland'
description: '廖龙东,网名Better,一枚喜欢研究心理学的前端er,从大学毕业一直专注前端开发领域，技术栈React、Vue、微信公众号、小程序、node和mongodb'
keyword: '廖龙东,廖龙东的个人网站,廖龙东的个人博客,Better,Better的个人网站,Better的个人博客,前端,web前端开发,H5,React,nodeJs,canvas'
# url: 'https://liaolongdong.github.io' # your host
url: 'https://liaolongdong.com' # your host

# if you don't need baseurl, you should leave this value blank.
baseurl: ''

# github baseUrl
githubUrl: 'https://github.com/liaolongdong'

# Navigation links
nav:
  home: '/'
  tags: '/tags.html'
  demo: '/demo.html'
  about: '/about.html'

# Author 配置博主信息
author: 'Better'
nickname: 'Better'
bio: '一枚喜欢研究心理学的前端er'
avatar: '/assets/img/profile.png'

# home page dandelion animate
dandelionAnimate: true

# about me config
aboutMe:
  authorWorkTimeLine: [
    {
      date: '2015-07',
      content: '这段时间在哪里工作，工作经验，项目经验等等'
    },
    {
      date: '2016-07',
      content: '这段时间在哪里工作，工作经验，项目经验等等'
    },
