<!-- 通用meta以及seo相关meta start -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="baidu-site-verification" content="KepNDjv9qh" />
<meta name="google-site-verification" content="JMobx2kEvbdWmhZ3vzFBbSrVNz4if5UGwRbprlQDmEM" />
<meta name="360-site-verification" content="66a6d55065761caeb8d685def4e5204a" />
<meta name="sogou_site_verification" content="icwLU81OPy"/>
<title>{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="author"  content="{{ site.author }}">
<meta name="description" content="{{ site.description }}">
<meta name="keywords"  content="{{ site.keyword }}">
<!-- 图片加载出现403错误 -->
<meta name="referrer" content="no-referrer" />
<!-- Open Graph -->
<meta property="og:title" content="{% if page.title %}{{ page.title }} - {{ site.title }}{% else %}{{ site.title }}{% endif %}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | prepend: site.url }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:site_name" content="{{ site.title }}">
<!-- 通用meta以及seo相关meta end -->
