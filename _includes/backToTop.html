<style media="screen">
    .scroll {
        display: none;
        position: fixed;
        right: 30px;
        bottom: 30px;
        z-index: 100;
        width: 40px;
        height: 40px;
        line-height: 40px;
        text-align: center;
        cursor: pointer;
        font-size: 12px;
        color: #8590A6;
        border-radius: 4px;
        background: #FFFFFF;
        box-shadow: 0 1px 3px rgba(26, 26, 26, 0.1);
    }
    .fanhuidingbu {
        display: none;
        width: 40px;
        height: 40px;
        font-size: 28px;
    }
    .scroll:hover {
        background: #D3D3D3;
    }
    .scroll:hover .percent-section {
        display: none;
    }
    .scroll:hover .fanhuidingbu {
        display: block;
    }
</style>
<div class="scroll">
    <span class="iconfont icon-fanhuidingbu fanhuidingbu"></span>
    <span class="percent-section"><span class="scrollpercent"></span><span>%</span></span>
</div>

<script src="/assets/js/util.js"></script>
<script type="text/javascript">
    $(document).ready(function () {
        // if (utils.isMobile()) {
        //     $('.scroll').hide();
        //     return;
        // }
        $(window).scroll(function () {
            let scrollValue = $(window).scrollTop();

            var scrollPercentRounded = Math.round((scrollValue / utils.getContentVisibilityHeight()) *
                100);
            var scrollPercentMaxed = (scrollPercentRounded > 100) ? 100 : scrollPercentRounded;

            $('.scrollpercent').html(scrollPercentMaxed);
            scrollValue > 100 ? $('.scroll').fadeIn() : $('.scroll').fadeOut();
        });

        $('.scroll').click(function () {
            $('html, body').animate({
                scrollTop: 0
            }, 300);
        })
    })
</script>
