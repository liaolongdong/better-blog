<div class="p-css-tips">
    <h1>用css如何实现圣杯布局（两侧定宽，中间自适应布局）</h1>
    <h2>两侧定宽，中间自适应布局</h2>
    <h3>使用flex布局</h3>
    <div class="flex-left-center-right">
        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
    </div>
    <h3>使用float布局</h3>
    <div class="float-left-center-right">
        <div class="left"></div>
        <div class="right"></div>
        <div class="center"></div>
    </div>
    <h3>使用table布局</h3>
    <div class="table-left-center-right">
        <div class="left"></div>
        <div class="center"></div>
        <div class="right"></div>
    </div>
</div>
