    <h3>支付宝JS-SDK 支付宝app内部调用支付宝支付demo</h3>
    <p>使用场景：支付宝app内环境，比如支付宝好友聊天窗口内打开该链接，在支付宝app外部环境不能使用</p>
    <button id="J_btn" class="btn btn-default">支付宝app内调用支付宝支付</button>
    <script>
        var btn = document.querySelector('#J_btn');
        btn.addEventListener('click', function () {
            ap.tradePay({
                tradeNO: '201802282100100427058809844'
            }, function (res) {
                ap.alert(res.resultCode);
            });
        });
    </script>
    <hr>
