<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>分享demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/social-share.js/1.0.16/css/share.min.css">
    <!-- <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script> -->
    <style>
        body {
            width: 100%;
            height: 100vh;
            display: table;
        }

        .social-share {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }
    </style>
</head>
<body>
    
</body>
    <div class="social-share"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/social-share.js/1.0.16/js/social-share.min.js"></script>
    <script>
        socialShare('.social-share', {
            url: window.location.href, // 分享链接地址 默认使用 window.location.href
            title: '分享标题', // 分享标题 默认读取 document.title 或者 <meta name="title" content="页面标题" />
            description: '分享描述', // 分享描述 默认读取head标签：<meta name="description" content="页面描述" />
            image: window.location.origin + '/assets/img/postCover/share_cover.png', // 分享缩略图图片, 默认取网页中第一个img标签
            sites: ['qzone', 'qq', 'weibo','wechat'],
            wechatQrcodeTitle: "分享到微信朋友圈",
            wechatQrcodeHelper: '<p>扫码后点击右上角</p><p>将本文分享至朋友圈</p>'
        });
    </script>
</html>
