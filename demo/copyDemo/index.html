<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>原生JS实现一键复制功能</title>
    <script src="https://cdn.staticfile.org/jquery/3.2.1/jquery.min.js"></script>
    <style>
        body {
            margin: 50px auto;
            text-align: center;
        }

        #copyText {
            margin: 30px;
        }
    </style>
</head>

<body>
    <div id="copyText">
        这是要复制的内容!!!
    </div>
    <button id="copyBtn">点击复制</button>
    <!-- <div>
        参考博客：原生 js 实现点击按钮复制文本
        https://www.cnblogs.com/wisewrong/p/7473978.html        
    </div> -->
</body>
<script>
    /**
     * 一键粘贴
     * @param  {String} id [需要粘贴的内容]
     * @param  {String} attr [需要 copy 的属性，默认是 innerText，主要用途例如赋值 a 标签上的 href 链接]
     *
     * range + selection
     *
     * 1.创建一个 range
     * 2.把内容放入 range
     * 3.把 range 放入 selection
     *
     * 注意：参数 attr 不能是自定义属性
     * 注意：对于 user-select: none 的元素无效
     * 注意：当 id 为 false 且 attr 不会空，会直接复制 attr 的内容
     */
    function myCopy(id, attr) {
        let target = null;

        if (attr) {
            target = document.createElement('div');
            target.id = 'tempTarget';
            target.style.opacity = '0';
            if (id) {
                let curNode = document.querySelector('#' + id);
                target.innerText = curNode[attr];
            } else {
                target.innerText = attr;
            }
            document.body.appendChild(target);
        } else {
            target = document.querySelector('#' + id);
        }

        try {
            let range = document.createRange();
            range.selectNode(target);
            window.getSelection().removeAllRanges();
            window.getSelection().addRange(range);
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            alert('复制成功');
            console.log('复制成功')
        } catch (e) {
            alert('复制失败');
            console.log('复制失败')
        }

        if (attr) {
            // remove temp target
            target.parentElement.removeChild(target);
        }
    }
    document.getElementById('copyBtn').addEventListener('click', function () {
        myCopy('copyText');
    });

    // 测试https://disqus.com/是否可访问
    function testUrlCanOpen(url) {
        $.ajax({
            type: 'get',
            url: url,
            cache: false,
            dataType: 'jsonp', // 跨域采用jsonp方式 
            processData: false,
            timeout: 3000, // 超时时间，毫秒
            complete: function (data) {
                if (data.status == 200) {
                    console.log('this url can open');
                } else {
                    console.log('this url can not open');
                }
            }
        });
    }
    testUrlCanOpen('https://disqus.com/');
</script>

</html>
