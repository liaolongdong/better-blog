<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5实现类似微信可拖拽左右吸边悬浮按钮</title>
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>
    <h1 class="title">H5实现类似微信可拖拽左右吸边悬浮按钮</h1>
    <h2 class="sub-title">手机模式下可拖拽“我的”按钮</h2>
    <div id="app">
        <div class="c-draggable-likewxfloat" :class="{ 'is-move': isMove, 'is-left': isLeft && !isMove }" @click="clickMineBtn">
            <img src="./img/my_person_icon.png" alt="我的" class="mine-btn" />
            <span class="text">我的</span>
        </div>
    </div>
    <script src="./js/vue.min.js"></script>
    <script src="./js/index.js"></script>
</body>

</html>
